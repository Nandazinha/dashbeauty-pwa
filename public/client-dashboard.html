<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBeauty - Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon"><i class="fas fa-spa"></i></div>
                <h1>dashbeauty</h1>
            </div>
            <div class="nav-menu">
                <button class="nav-link active" data-page="home">Início</button>
                <button class="nav-link" data-page="appointments">Agendamentos</button>
                <button class="nav-link" data-page="favorites">Favoritos</button>
                <button class="nav-link" data-page="profile">Perfil</button>
            </div>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Página HOME -->
            <div id="page-home" class="page active">
                <div class="greeting">
                    <h2>Olá, <span id="welcome-name"></span>!</h2>
                    <p>Encontre os melhores serviços de beleza perto de você</p>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar salão ou serviço...">
                    <button id="search-btn">Buscar</button>
                </div>
                <div class="section-title">Categorias Populares</div>
                <div class="categories-grid" id="categories-grid">
                    <div class="category-card" data-cat="Cabelo"><i class="fas fa-cut"></i><span>Cabelo</span></div>
                    <div class="category-card" data-cat="Unhas"><i class="fas fa-hand-peace"></i><span>Unhas</span></div>
                    <div class="category-card" data-cat="Maquiagem"><i class="fas fa-brush"></i><span>Maquiagem</span></div>
                    <div class="category-card" data-cat="Massagem"><i class="fas fa-spa"></i><span>Massagem</span></div>
                    <div class="category-card" data-cat="Sobrancelhas"><i class="fas fa-eye"></i><span>Sobrancelhas</span></div>
                    <div class="category-card" data-cat="Depilação"><i class="fas fa-wind"></i><span>Depilação</span></div>
                </div>
                <div class="section-title">Salões em Destaque</div>
                <div id="businesses-list" class="businesses-grid"></div>
            </div>

            <!-- Página AGENDAMENTOS -->
            <div id="page-appointments" class="page">
                <div class="section-title">Meus Agendamentos</div>
                <div id="appointments-list" class="appointments-list"></div>
            </div>

            <!-- Página FAVORITOS -->
            <div id="page-favorites" class="page">
                <div class="section-title">Meus Favoritos</div>
                <div id="favorites-list" class="businesses-grid"></div>
            </div>

            <!-- Página PERFIL -->
            <div id="page-profile" class="page">
                <div class="section-title">Meu Perfil</div>
                <div class="profile-card">
                    <div class="profile-avatar"><i class="fas fa-user-circle"></i></div>
                    <div class="profile-info">
                        <h3 id="profile-name"></h3>
                        <p id="profile-email"></p>
                        <p id="profile-phone"></p>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-appointments">0</div>
                        <div class="stat-label">Agendamentos</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-favorites">0</div>
                        <div class="stat-label">Favoritos</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DE AGENDAMENTO -->
    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBookingModal()">&times;</span>
            <h3>Agendar Serviço</h3>
            <div id="booking-form"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================
        // DADOS MOCKADOS (100% FUNCIONAIS)
        // ============================================
        
        const businesses = [
            { id: 1, name: 'Salão da Maria', address: 'Rua das Flores, 123 - SP', rating: 4.8, featured: true, category: 'Cabelo', 
              services: [
                  { id: 1, name: 'Corte de Cabelo', price: 50, duration: 45, description: 'Corte moderno' },
                  { id: 2, name: 'Coloração', price: 120, duration: 120, description: 'Coloração completa' },
                  { id: 3, name: 'Hidratação', price: 80, duration: 60, description: 'Tratamento capilar' }
              ]},
            { id: 2, name: 'Studio de Beleza', address: 'Av. Paulista, 1000 - SP', rating: 4.5, featured: false, category: 'Unhas',
              services: [
                  { id: 4, name: 'Manicure', price: 70, duration: 90, description: 'Alongamento de unhas' },
                  { id: 5, name: 'Pedicure', price: 60, duration: 60, description: 'Pé completo' }
              ]},
            { id: 3, name: 'Espaço Estética', address: 'Rua Augusta, 500 - SP', rating: 4.9, featured: true, category: 'Massagem',
              services: [
                  { id: 6, name: 'Massagem Relaxante', price: 100, duration: 60, description: 'Massagem completa' },
                  { id: 7, name: 'Limpeza de Pele', price: 90, duration: 50, description: 'Limpeza profunda' }
              ]}
        ];

        let currentUser = {
            name: localStorage.getItem('user_name') || 'Cliente',
            email: localStorage.getItem('user_id') || 'cliente@email.com',
            phone: '(11) 99999-9999'
        };
        
        let appointments = JSON.parse(localStorage.getItem('client_appointments') || '[]');
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let currentBusiness = null;
        let selectedService = null;

        // ============================================
        // FUNÇÕES PRINCIPAIS
        // ============================================
        
        function checkAuth() {
            if (!localStorage.getItem('auth_token')) {
                window.location.href = 'login.html';
            }
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function renderStars(rating) {
            let stars = '';
            for (let i = 0; i < Math.floor(rating); i++) stars += '<i class="fas fa-star"></i>';
            if (rating % 1 >= 0.5) stars += '<i class="fas fa-star-half-alt"></i>';
            for (let i = stars.length / 2; i < 5; i++) stars += '<i class="far fa-star"></i>';
            return stars;
        }
        
        function loadUserInfo() {
            document.getElementById('user-name').innerHTML = currentUser.name;
            document.getElementById('welcome-name').innerHTML = currentUser.name;
            document.getElementById('profile-name').innerHTML = currentUser.name;
            document.getElementById('profile-email').innerHTML = currentUser.email;
            document.getElementById('profile-phone').innerHTML = currentUser.phone;
            document.getElementById('stat-appointments').innerHTML = appointments.length;
            document.getElementById('stat-favorites').innerHTML = favorites.length;
        }
        
        function displayBusinesses(list, containerId, showFavoriteBtn = false) {
            const container = document.getElementById(containerId);
            if (!list.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-store-slash"></i><h3>Nenhum estabelecimento</h3><p>Tente buscar por outro termo</p></div>';
                return;
            }
            
            container.innerHTML = list.map(b => `
                <div class="business-card" onclick="showBusinessDetail(${b.id})">
                    <div class="business-image">
                        <i class="fas fa-store"></i>
                        ${b.featured ? '<span class="featured-tag">Destaque</span>' : ''}
                        ${showFavoriteBtn ? `
                            <button class="btn-favorite ${favorites.includes(b.id) ? 'active' : ''}" 
                                    onclick="event.stopPropagation(); toggleFavorite(${b.id})">
                                <i class="fas fa-heart"></i>
                            </button>
                        ` : ''}
                    </div>
                    <div class="business-info">
                        <h4>${b.name}</h4>
                        <div class="business-rating">
                            <div class="stars">${renderStars(b.rating)}</div>
                            <span style="color: rgba(255,255,255,0.5);">(${b.rating})</span>
                        </div>
                        <div class="business-address">
                            <i class="fas fa-map-marker-alt"></i> ${b.address}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function loadBusinesses() {
            displayBusinesses(businesses.filter(b => b.featured), 'businesses-list');
        }
        
        function searchBusinesses(query) {
            const filtered = businesses.filter(b => 
                b.name.toLowerCase().includes(query.toLowerCase()) ||
                b.category.toLowerCase().includes(query.toLowerCase())
            );
            displayBusinesses(filtered, 'businesses-list');
        }
        
        function showBusinessDetail(id) {
            currentBusiness = businesses.find(b => b.id === id);
            const modal = document.getElementById('booking-modal');
            
            document.getElementById('booking-form').innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h4>${currentBusiness.name}</h4>
                    <p>${currentBusiness.address}</p>
                    <div class="stars">${renderStars(currentBusiness.rating)}</div>
                </div>
                <div class="services-list" style="display: flex; flex-direction: column; gap: 16px;">
                    <h4>Serviços disponíveis</h4>
                    ${currentBusiness.services.map(s => `
                        <div class="service-card" style="display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 12px;">
                            <div>
                                <strong>${s.name}</strong>
                                <p style="font-size: 12px; color: rgba(255,255,255,0.6);">${s.description}</p>
                                <span class="service-price" style="color: #6C3BD4; font-weight: bold;">R$ ${s.price.toFixed(2)}</span>
                                <span class="service-duration" style="margin-left: 12px; font-size: 12px;">⏱️ ${s.duration} min</span>
                            </div>
                            <button class="btn-book" onclick="selectService(${s.id})">Agendar</button>
                        </div>
                    `).join('')}
                </div>
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeBookingModal()">Fechar</button>
                </div>
            `;
            modal.style.display = 'flex';
        }
        
        function selectService(serviceId) {
            selectedService = currentBusiness.services.find(s => s.id === serviceId);
            const today = new Date().toISOString().split('T')[0];
            const maxDate = new Date();
            maxDate.setDate(maxDate.getDate() + 30);
            
            document.getElementById('booking-form').innerHTML = `
                <h4>${currentBusiness.name}</h4>
                <p><strong>Serviço:</strong> ${selectedService.name}</p>
                <p><strong>Valor:</strong> R$ ${selectedService.price.toFixed(2)}</p>
                <p><strong>Duração:</strong> ${selectedService.duration} minutos</p>
                
                <div class="form-group">
                    <label>Data</label>
                    <div class="input-group">
                        <i class="fas fa-calendar"></i>
                        <input type="date" id="booking-date" min="${today}" max="${maxDate.toISOString().split('T')[0]}" value="${today}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Horário</label>
                    <div class="input-group">
                        <i class="fas fa-clock"></i>
                        <select id="booking-time">
                            <option value="09:00">09:00</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                            <option value="17:00">17:00</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Observações</label>
                    <div class="input-group">
                        <i class="fas fa-pen"></i>
                        <textarea id="booking-notes" rows="3" placeholder="Alguma observação?"></textarea>
                    </div>
                </div>
                
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="showBusinessDetail(${currentBusiness.id})">Voltar</button>
                    <button class="btn-primary" onclick="confirmBooking()">Confirmar Agendamento</button>
                </div>
            `;
        }
        
        function confirmBooking() {
            const newAppointment = {
                id: Date.now(),
                businessId: currentBusiness.id,
                businessName: currentBusiness.name,
                serviceId: selectedService.id,
                serviceName: selectedService.name,
                price: selectedService.price,
                date: document.getElementById('booking-date').value,
                time: document.getElementById('booking-time').value,
                notes: document.getElementById('booking-notes').value,
                status: 'scheduled',
                createdAt: new Date().toISOString()
            };
            
            appointments.push(newAppointment);
            localStorage.setItem('client_appointments', JSON.stringify(appointments));
            
            showToast('Agendamento realizado com sucesso!', 'success');
            closeBookingModal();
            loadAppointments();
            loadUserInfo();
            
            // Mudar para página de agendamentos
            document.querySelector('[data-page="appointments"]').click();
        }
        
        function loadAppointments() {
            const container = document.getElementById('appointments-list');
            if (!appointments.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-alt"></i><h3>Nenhum agendamento</h3><button class="btn-primary" onclick="document.querySelector(\'[data-page="home"]\').click()">Encontrar Salões</button></div>';
                return;
            }
            
            const sorted = [...appointments].sort((a, b) => new Date(b.date) - new Date(a.date));
            container.innerHTML = sorted.map(a => `
                <div class="appointment-card">
                    <div>
                        <h4>${a.serviceName}</h4>
                        <p><i class="fas fa-store"></i> ${a.businessName}</p>
                        <p><i class="fas fa-calendar"></i> ${formatDate(a.date)} às ${a.time}</p>
                        <p><strong>R$ ${a.price.toFixed(2)}</strong></p>
                        <span class="appointment-status status-${a.status}">${getStatusText(a.status)}</span>
                        ${a.notes ? `<p style="font-size: 12px; margin-top: 8px;"><i class="fas fa-pen"></i> ${a.notes}</p>` : ''}
                    </div>
                    ${a.status === 'scheduled' ? `<button class="btn-cancel" onclick="cancelAppointment(${a.id})">Cancelar</button>` : ''}
                </div>
            `).join('');
        }
        
        function cancelAppointment(id) {
            if (confirm('Tem certeza que deseja cancelar este agendamento?')) {
                appointments = appointments.filter(a => a.id !== id);
                localStorage.setItem('client_appointments', JSON.stringify(appointments));
                loadAppointments();
                loadUserInfo();
                showToast('Agendamento cancelado com sucesso', 'success');
            }
        }
        
        function loadFavorites() {
            const favoriteBusinesses = businesses.filter(b => favorites.includes(b.id));
            displayBusinesses(favoriteBusinesses, 'favorites-list', true);
        }
        
        function toggleFavorite(businessId) {
            if (favorites.includes(businessId)) {
                favorites = favorites.filter(id => id !== businessId);
                showToast('Removido dos favoritos', 'success');
            } else {
                favorites.push(businessId);
                showToast('Adicionado aos favoritos', 'success');
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            loadFavorites();
            loadUserInfo();
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR');
        }
        
        function getStatusText(status) {
            const statusMap = { scheduled: 'Agendado', completed: 'Concluído', cancelled: 'Cancelado', confirmed: 'Confirmado' };
            return statusMap[status] || status;
        }
        
        function closeBookingModal() {
            document.getElementById('booking-modal').style.display = 'none';
            currentBusiness = null;
            selectedService = null;
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // ============================================
        // EVENTOS E INICIALIZAÇÃO
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadUserInfo();
            loadBusinesses();
            loadAppointments();
            loadFavorites();
            
            // Navegação
            document.querySelectorAll('.nav-link').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
                    if (btn.dataset.page === 'favorites') loadFavorites();
                    if (btn.dataset.page === 'appointments') loadAppointments();
                });
            });
            
            // Busca
            document.getElementById('search-btn').addEventListener('click', () => {
                const query = document.getElementById('search-input').value;
                if (query) searchBusinesses(query);
                else loadBusinesses();
            });
            
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = e.target.value;
                    if (query) searchBusinesses(query);
                    else loadBusinesses();
                }
            });
            
            // Categorias
            document.querySelectorAll('.category-card').forEach(card => {
                card.addEventListener('click', () => {
                    const category = card.dataset.cat;
                    document.querySelector('[data-page="home"]').click();
                    const filtered = businesses.filter(b => b.category === category);
                    displayBusinesses(filtered, 'businesses-list');
                    document.getElementById('search-input').value = category;
                });
            });
        });
    </script>
</body>
</html>
