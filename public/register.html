<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | DashBeauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="register-container">
        <div class="auth-card">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            <div class="logo-large">
                <div class="logo-icon"><i class="fas fa-spa"></i></div>
                <h2>Criar conta</h2>
                <p>Comece sua jornada conosco</p>
            </div>
            <div class="role-selector">
                <button class="role-btn active" data-role="client">Sou Cliente</button>
                <button class="role-btn" data-role="business">Sou Empresa</button>
            </div>
            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome completo</label>
                        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="register-name" placeholder="Seu nome" required></div>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="register-phone" placeholder="(11) 99999-9999" required></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="register-email" placeholder="seu@email.com" required></div>
                </div>
                <div class="form-group business-field">
                    <label>Nome do estabelecimento</label>
                    <div class="input-group"><i class="fas fa-store"></i><input type="text" id="register-business-name" placeholder="Nome do seu salão"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="register-password" placeholder="••••••••" required><i class="fas fa-eye-slash toggle-password"></i></div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar senha</label>
                        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="register-confirm-password" placeholder="••••••••" required></div>
                    </div>
                </div>
                <div class="terms">
                    <label class="checkbox"><input type="checkbox" required> Li e aceito os <a href="#">Termos de uso</a></label>
                </div>
                <button type="submit" class="btn-primary">Criar conta gratuita</button>
            </form>
            <div class="auth-footer"><p>Já tem uma conta? <a href="login.html">Faça login</a></p></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let selectedRole = 'client';
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
                document.querySelector('.business-field').style.display = selectedRole === 'business' ? 'block' : 'none';
            });
        });
        
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                if (input.type === 'password') { input.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); }
                else { input.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); }
            });
        });
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const businessName = document.getElementById('register-business-name').value;
            
            if (!name || !email || !phone || !password) { showToast('Preencha todos os campos', 'error'); return; }
            if (password !== confirmPassword) { showToast('As senhas não coincidem', 'error'); return; }
            if (password.length < 6) { showToast('A senha deve ter pelo menos 6 caracteres', 'error'); return; }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) { showToast('Email já cadastrado', 'error'); return; }
            
            users.push({ email, password, name, phone, type: selectedRole, businessName: selectedRole === 'business' ? businessName || name : null });
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('auth_token', 'mock_token_' + Date.now());
            localStorage.setItem('user_id', email);
            localStorage.setItem('user_type', selectedRole);
            localStorage.setItem('user_name', name);
            if (selectedRole === 'business') localStorage.setItem('business_name', businessName || name);
            
            showToast('Cadastro realizado com sucesso!', 'success');
            setTimeout(() => {
                if (selectedRole === 'business') window.location.href = 'business-dashboard.html';
                else window.location.href = 'client-dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
