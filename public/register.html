<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - DashBeauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6C3BD4 0%, #8B5CF6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 560px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6C3BD4;
            text-decoration: none;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo i {
            font-size: 48px;
            color: #6C3BD4;
            background: #F3F0FF;
            padding: 16px;
            border-radius: 20px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1F2937;
            margin-top: 16px;
        }

        .role-badge {
            text-align: center;
            background: #F3F0FF;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            margin: 0 auto 24px;
            font-weight: 600;
        }

        .role-badge.client {
            background: #F3F0FF;
            color: #6C3BD4;
        }

        .role-badge.business {
            background: #FFF8F0;
            color: #F5A623;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #374151;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i:first-child {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }

        .input-icon input,
        .input-icon select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-icon input:focus,
        .input-icon select:focus {
            outline: none;
            border-color: #6C3BD4;
            box-shadow: 0 0 0 3px rgba(108, 59, 212, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #6B7280;
        }

        .btn-primary {
            width: 100%;
            background: #6C3BD4;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #5A2DB8;
            transform: translateY(-2px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
            font-size: 14px;
            color: #6B7280;
        }

        .auth-footer a {
            color: #6C3BD4;
            text-decoration: none;
            font-weight: 500;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1F2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .toast.success {
            background: #10B981;
        }

        .toast.error {
            background: #EF4444;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>

            <div class="logo">
                <i class="fas fa-spa"></i>
                <h1>DashBeauty</h1>
            </div>

            <div id="role-badge" class="role-badge client">
                <i class="fas fa-user-circle"></i> Cadastrando como Cliente
            </div>

            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome completo</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="register-name" required placeholder="Seu nome">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <div class="input-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="register-phone" required placeholder="(11) 99999-9999">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" required placeholder="seu@email.com">
                    </div>
                </div>
                <div class="form-group" id="business-fields" style="display: none;">
                    <label>Nome do estabelecimento</label>
                    <div class="input-icon">
                        <i class="fas fa-store"></i>
                        <input type="text" id="register-business-name" placeholder="Nome do seu salão">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="register-password" required placeholder="********">
                            <i class="fas fa-eye-slash toggle-password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar senha</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="register-confirm-password" required placeholder="********">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" required> Li e aceito os <a href="#">Termos de uso</a>
                    </label>
                </div>
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>

            <div class="auth-footer">
                <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let selectedType = urlParams.get('type') || 'client';
        
        const roleBadge = document.getElementById('role-badge');
        const registerBtn = document.querySelector('.btn-primary');
        const businessFields = document.getElementById('business-fields');
        
        if (selectedType === 'business') {
            roleBadge.className = 'role-badge business';
            roleBadge.innerHTML = '<i class="fas fa-store"></i> Cadastrando como Empresa';
            registerBtn.style.background = '#F5A623';
            businessFields.style.display = 'block';
        } else {
            roleBadge.className = 'role-badge client';
            roleBadge.innerHTML = '<i class="fas fa-user-circle"></i> Cadastrando como Cliente';
            registerBtn.style.background = '#6C3BD4';
            businessFields.style.display = 'none';
        }
        
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                }
            });
        });
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            if (!name || !email || !phone || !password) {
                showToast('Preencha todos os campos', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('As senhas não coincidem', 'error');
                return;
            }
            
            const userData = {
                name: name,
                email: email,
                phone: phone,
                password: password,
                user_type: selectedType
            };
            
            if (selectedType === 'business') {
                userData.business_name = document.getElementById('register-business-name').value || name;
            }
            
            try {
                const response = await fetch('http://dashbeauty.test/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth_token', data.data.token);
                    localStorage.setItem('user_id', data.data.user_id);
                    localStorage.setItem('user_type', data.data.user_type);
                    localStorage.setItem('user_name', data.data.name);
                    
                    showToast('Cadastro realizado com sucesso!', 'success');
                    
                    setTimeout(() => {
                        if (selectedType === 'business') {
                            window.location.href = 'business-dashboard.html';
                        } else {
                            window.location.href = 'client-dashboard.html';
                        }
                    }, 1000);
                } else {
                    showToast(data.message || 'Erro ao cadastrar', 'error');
                }
            } catch (error) {
                showToast('Erro de conexão com o servidor', 'error');
            }
        });
    </script>
</body>
</html>
