<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBeauty - Empresa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon"><i class="fas fa-spa"></i></div>
                <h1>dashbeauty</h1>
            </div>
            <div class="nav-menu">
                <button class="nav-link active" data-page="dashboard">Dashboard</button>
                <button class="nav-link" data-page="services">Serviços</button>
                <button class="nav-link" data-page="appointments">Agendamentos</button>
                <button class="nav-link" data-page="profile">Perfil</button>
            </div>
            <div class="user-info">
                <span class="user-name" id="business-name"></span>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- PÁGINA DASHBOARD -->
            <div id="page-dashboard" class="page active">
                <div class="section-title">Dashboard</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="total-services">0</div>
                        <div class="stat-label">Serviços</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-appointments">0</div>
                        <div class="stat-label">Agendamentos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-revenue">R$ 0</div>
                        <div class="stat-label">Faturamento</div>
                    </div>
                </div>
                <div class="section-title">Agendamentos Recentes</div>
                <div id="recent-appointments" class="appointments-list"></div>
            </div>

            <!-- PÁGINA SERVIÇOS -->
            <div id="page-services" class="page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div class="section-title">Meus Serviços</div>
                    <button class="btn-primary small" onclick="showAddServiceModal()"><i class="fas fa-plus"></i> Novo Serviço</button>
                </div>
                <div id="services-list" class="services-list"></div>
            </div>

            <!-- PÁGINA AGENDAMENTOS -->
            <div id="page-appointments" class="page">
                <div class="section-title">Agendamentos</div>
                <div id="business-appointments" class="appointments-list"></div>
            </div>

            <!-- PÁGINA PERFIL -->
            <div id="page-profile" class="page">
                <div class="section-title">Perfil da Empresa</div>
                <div class="profile-card">
                    <div class="profile-avatar"><i class="fas fa-store"></i></div>
                    <div class="profile-info">
                        <h3 id="profile-name"></h3>
                        <p id="profile-email"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DE SERVIÇO -->
    <div id="service-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeServiceModal()">&times;</span>
            <h3 id="modal-title">Novo Serviço</h3>
            <div class="form-group">
                <label>Nome do serviço</label>
                <input type="text" id="service-name" placeholder="Ex: Corte de Cabelo">
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea id="service-desc" rows="3" placeholder="Descreva o serviço..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="service-price" step="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label>Duração (min)</label>
                    <input type="number" id="service-duration" placeholder="60">
                </div>
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <select id="service-cat">
                    <option>Cabelo</option>
                    <option>Unhas</option>
                    <option>Maquiagem</option>
                    <option>Massagem</option>
                    <option>Estética</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeServiceModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveService()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let services = JSON.parse(localStorage.getItem('business_services') || '[]');
        let appointments = JSON.parse(localStorage.getItem('business_appointments') || '[]');
        let editingId = null;
        let businessName = localStorage.getItem('business_name') || 'Meu Salão';
        let businessEmail = localStorage.getItem('user_id') || 'empresa@email.com';

        function checkAuth() {
            if (!localStorage.getItem('auth_token') || localStorage.getItem('user_type') !== 'business') {
                window.location.href = 'login.html';
            }
        }
        
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function loadServices() {
            const container = document.getElementById('services-list');
            if (!services.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-cut"></i><h3>Nenhum serviço cadastrado</h3><button class="btn-primary" onclick="showAddServiceModal()">Adicionar Serviço</button></div>';
                return;
            }
            container.innerHTML = services.map(s => `
                <div class="service-card">
                    <div class="service-info">
                        <h4>${s.name}</h4>
                        <p>${s.desc || ''}</p>
                        <div>
                            <span class="service-price">R$ ${s.price.toFixed(2)}</span>
                            <span class="service-duration" style="margin-left: 12px;">⏱️ ${s.duration} min</span>
                        </div>
                    </div>
                    <div class="service-actions">
                        <button class="btn-edit" onclick="editService(${s.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteService(${s.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('total-services').innerHTML = services.length;
        }
        
        function showAddServiceModal() {
            editingId = null;
            document.getElementById('modal-title').innerText = 'Novo Serviço';
            document.getElementById('service-name').value = '';
            document.getElementById('service-desc').value = '';
            document.getElementById('service-price').value = '';
            document.getElementById('service-duration').value = '';
            document.getElementById('service-cat').value = 'Cabelo';
            document.getElementById('service-modal').style.display = 'flex';
        }
        
        function editService(id) {
            const s = services.find(s => s.id === id);
            if (s) {
                editingId = id;
                document.getElementById('modal-title').innerText = 'Editar Serviço';
                document.getElementById('service-name').value = s.name;
                document.getElementById('service-desc').value = s.desc || '';
                document.getElementById('service-price').value = s.price;
                document.getElementById('service-duration').value = s.duration;
                document.getElementById('service-cat').value = s.cat;
                document.getElementById('service-modal').style.display = 'flex';
            }
        }
        
        function saveService() {
            const name = document.getElementById('service-name').value;
            const desc = document.getElementById('service-desc').value;
            const price = parseFloat(document.getElementById('service-price').value);
            const duration = parseInt(document.getElementById('service-duration').value);
            const cat = document.getElementById('service-cat').value;
            
            if (!name || !price || !duration) {
                showToast('Preencha todos os campos obrigatórios', 'error');
                return;
            }
            
            if (editingId) {
                const index = services.findIndex(s => s.id === editingId);
                if (index !== -1) {
                    services[index] = { ...services[index], name, desc, price, duration, cat };
                }
                showToast('Serviço atualizado com sucesso!', 'success');
            } else {
                services.push({ id: Date.now(), name, desc, price, duration, cat });
                showToast('Serviço criado com sucesso!', 'success');
            }
            
            localStorage.setItem('business_services', JSON.stringify(services));
            closeServiceModal();
            loadServices();
            updateDashboard();
        }
        
        function deleteService(id) {
            if (confirm('Tem certeza que deseja excluir este serviço?')) {
                services = services.filter(s => s.id !== id);
                localStorage.setItem('business_services', JSON.stringify(services));
                loadServices();
                updateDashboard();
                showToast('Serviço excluído com sucesso', 'success');
            }
        }
        
        function loadAppointments() {
            const container = document.getElementById('business-appointments');
            if (!appointments.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-alt"></i><h3>Nenhum agendamento</h3></div>';
                return;
            }
            container.innerHTML = appointments.map(a => `
                <div class="appointment-card">
                    <div class="appointment-info">
                        <h4>${a.serviceName}</h4>
                        <p><strong>Cliente:</strong> ${a.clientName}</p>
                        <p><i class="fas fa-calendar"></i> ${formatDate(a.date)} às ${a.time}</p>
                        <p><strong>Valor:</strong> R$ ${a.price.toFixed(2)}</p>
                        <span class="appointment-status status-${a.status}">${getStatusText(a.status)}</span>
                        ${a.notes ? `<p style="font-size: 12px; margin-top: 8px;"><i class="fas fa-pen"></i> ${a.notes}</p>` : ''}
                    </div>
                    <div>
                        <select class="status-select" onchange="updateStatus(${a.id}, this.value)" style="padding: 6px 12px; border-radius: 20px; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);">
                            <option value="scheduled" ${a.status === 'scheduled' ? 'selected' : ''}>Agendado</option>
                            <option value="confirmed" ${a.status === 'confirmed' ? 'selected' : ''}>Confirmado</option>
                            <option value="completed" ${a.status === 'completed' ? 'selected' : ''}>Concluído</option>
                            <option value="cancelled" ${a.status === 'cancelled' ? 'selected' : ''}>Cancelado</option>
                        </select>
                    </div>
                </div>
            `).join('');
            document.getElementById('total-appointments').innerHTML = appointments.length;
            const totalRevenue = appointments.reduce((sum, a) => sum + a.price, 0);
            document.getElementById('total-revenue').innerHTML = `R$ ${totalRevenue.toFixed(2)}`;
        }
        
        function updateStatus(id, newStatus) {
            const index = appointments.findIndex(a => a.id === id);
            if (index !== -1) {
                appointments[index].status = newStatus;
                localStorage.setItem('business_appointments', JSON.stringify(appointments));
                loadAppointments();
                updateDashboard();
                showToast('Status atualizado!', 'success');
            }
        }
        
        function updateDashboard() {
            document.getElementById('total-services').innerHTML = services.length;
            document.getElementById('total-appointments').innerHTML = appointments.length;
            const totalRevenue = appointments.reduce((sum, a) => sum + a.price, 0);
            document.getElementById('total-revenue').innerHTML = `R$ ${totalRevenue.toFixed(2)}`;
            
            const recent = [...appointments].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            const container = document.getElementById('recent-appointments');
            if (!recent.length) {
                container.innerHTML = '<div class="empty-state">Nenhum agendamento recente</div>';
                return;
            }
            container.innerHTML = recent.map(a => `
                <div class="appointment-card">
                    <div class="appointment-info">
                        <h4>${a.serviceName}</h4>
                        <p><strong>Cliente:</strong> ${a.clientName}</p>
                        <p>${formatDate(a.date)} às ${a.time}</p>
                    </div>
                    <span class="appointment-status status-${a.status}">${getStatusText(a.status)}</span>
                </div>
            `).join('');
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR');
        }
        
        function getStatusText(status) {
            const statusMap = { scheduled: 'Agendado', confirmed: 'Confirmado', completed: 'Concluído', cancelled: 'Cancelado' };
            return statusMap[status] || status;
        }
        
        function closeServiceModal() {
            document.getElementById('service-modal').style.display = 'none';
            editingId = null;
        }
        
        function updateProfile() {
            document.getElementById('business-name').innerHTML = businessName;
            document.getElementById('profile-name').innerHTML = businessName;
            document.getElementById('profile-email').innerHTML = businessEmail;
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // Inicialização
        checkAuth();
        updateProfile();
        loadServices();
        loadAppointments();
        updateDashboard();
        
        // Navegação entre abas
        document.querySelectorAll('.nav-link').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
                if (btn.dataset.page === 'services') loadServices();
                if (btn.dataset.page === 'appointments') loadAppointments();
                if (btn.dataset.page === 'dashboard') updateDashboard();
            });
        });
    </script>
</body>
</html>
