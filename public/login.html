<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DashBeauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            <div class="logo-large">
                <div class="logo-icon"><i class="fas fa-spa"></i></div>
                <h2>Bem-vindo de volta</h2>
                <p>Entre com sua conta para continuar</p>
            </div>
            <div class="role-selector">
                <button class="role-btn active" data-role="client">Cliente</button>
                <button class="role-btn" data-role="business">Empresa</button>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <i class="fas fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="auth-footer">
                <p>Não tem uma conta? <a href="register.html">Cadastre-se gratuitamente</a></p>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let selectedRole = 'client';
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
            });
        });
        
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const input = document.getElementById('login-password');
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            } else {
                input.type = 'password';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            }
        });
        
        const mockUsers = [
            { email: 'cliente@dashbeauty.com', password: '123456', name: 'Ana Cliente', type: 'client' },
            { email: 'empresa@dashbeauty.com', password: '123456', name: 'Maria Empresária', type: 'business', businessName: 'Meu Salão' }
        ];
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showToast('Preencha todos os campos', 'error');
                return;
            }
            
            const user = mockUsers.find(u => u.email === email && u.password === password);
            if (!user) {
                showToast('Email ou senha inválidos', 'error');
                return;
            }
            
            if (user.type !== selectedRole) {
                showToast(`Esta conta é de ${user.type === 'client' ? 'cliente' : 'empresa'}`, 'error');
                return;
            }
            
            localStorage.setItem('auth_token', 'mock_token_' + Date.now());
            localStorage.setItem('user_id', user.email);
            localStorage.setItem('user_type', user.type);
            localStorage.setItem('user_name', user.name);
            if (user.type === 'business') localStorage.setItem('business_name', user.businessName || user.name);
            
            showToast('Login realizado com sucesso!', 'success');
            setTimeout(() => {
                if (user.type === 'business') window.location.href = 'business-dashboard.html';
                else window.location.href = 'client-dashboard.html';
            }, 1000);
        });
    </script>
</body>
</html>
